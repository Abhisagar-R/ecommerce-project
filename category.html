<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Category</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">
  <h2 class="text-center mb-5">Categories</h2>

  <div class="row text-center">

    <!-- Clothing -->
    <div class="col-md-4 mb-4">
      <div class="card shadow p-3">
        <img src="assets/images/product1.png" class="img-fluid" style="height:200px; object-fit:contain;">
        <h5 class="mt-3">Clothing</h5>
        <p>Explore stylish and comfortable clothing items.</p>
      </div>
    </div>

    <!-- Shoes -->
    <div class="col-md-4 mb-4">
      <div class="card shadow p-3">
        <img src="assets/images/product5.png" class="img-fluid" style="height:200px; object-fit:contain;">
        <h5 class="mt-3">Shoes</h5>
        <p>Find the best shoes for every occasion.</p>
      </div>
    </div>

    <!-- Accessories -->
    <div class="col-md-4 mb-4">
      <div class="card shadow p-3">
        <img src="assets/images/product6.png" class="img-fluid" style="height:200px; object-fit:contain;">
        <h5 class="mt-3">Accessories</h5>
        <p>Complete your look with trendy accessories.</p>
      </div>
    </div>

  </div>
</div>

</body>
</html>
