<!-- RENDER PRODUCTS -->
<script>
const container = document.getElementById("product-list");

let selectedCategory = "All";
let selectedPrice = 1000;


function renderProducts() {
  container.innerHTML = "";

  let filtered = products.filter(p => {
    return (
      (selectedCategory === "All" || p.category === selectedCategory) &&
      p.price <= selectedPrice
    );
  });

  filtered.forEach(p => {
    container.innerHTML += `
      <div class="col-md-4 mb-4 d-flex">
        <div class="card w-100 text-center shadow">
          <img src="${p.image}" class="card-img-top p-3" style="height:250px; object-fit:contain;">
          <div class="card-body">
            <h5>${p.name}</h5>
            <p>₹${p.price}</p>
            <button onclick="addToCart(${p.id})" class="btn btn-primary">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    `;
  });
}


function setCategory(category) {
  selectedCategory = category;
  renderProducts();
}
const params = new URLSearchParams(window.location.search);
const urlCategory = params.get("category");

if (urlCategory) {
  selectedCategory = urlCategory;
}

document.getElementById("priceRange").addEventListener("input", function () {
  selectedPrice = parseInt(this.value);
  document.getElementById("priceValue").innerText = "₹100 - ₹" + selectedPrice;
  renderProducts();
});


renderProducts();
</script>
