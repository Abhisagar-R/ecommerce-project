<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product View</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
  <a class="navbar-brand font-weight-bold" href="index.html">
    THE FASHION STORE
  </a>

  <div class="ml-auto d-flex align-items-center">
    <a href="index.html" class="btn btn-outline-primary mr-2">Home</a>
    <a href="products.html" class="btn btn-outline-primary mr-2">Products</a>

    <div class="cart-wrapper">
      <a href="cart.html" class="btn btn-outline-primary">
        Cart (<span id="count">0</span>)
      </a>
      <div class="mini-cart" id="mini-cart"></div>
    </div>
  </div>
</nav>

<!-- PRODUCT -->
<div class="container mt-5">
  <div class="row">

    <div class="col-md-6 text-center">
      <img id="product-img" class="img-fluid" style="max-height:400px;">
    </div>

    <div class="col-md-6">
      <h3 id="product-name"></h3>
      <span class="badge badge-info mb-2" id="product-category"></span>
      <h4 class="text-success" id="product-price"></h4>
      <p id="product-desc"></p>

      <div class="mb-3">
        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1" class="form-control" style="width:100px;">
      </div>

      <button onclick="addToCartWithAnimation()" class="btn btn-primary">
        Add to Cart
      </button>
    </div>

  </div>
</div>

<!-- RELATED -->
<div class="container mt-5">
  <h4 class="mb-4">Related Products</h4>
  <div class="related-scroll" id="related-products"></div>
</div>

<!-- JS -->
<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>

<script>
// LOAD PRODUCT
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));

const product = products.find(p => p.id == id);

if (product) {
  document.getElementById("product-img").src = product.image;
  document.getElementById("product-name").innerText = product.name;
  document.getElementById("product-price").innerText = "₹" + product.price;
  document.getElementById("product-desc").innerText = product.desc;
  document.getElementById("product-category").innerText = product.category;
}

// ADD TO CART + ANIMATION
function addToCartWithAnimation() {
  const qty = parseInt(document.getElementById("qty").value);

  const img = document.getElementById("product-img");
  const cartBtn = document.querySelector(".cart-wrapper a");

  // clone image
  const clone = img.cloneNode(true);
  clone.style.position = "absolute";
  clone.style.top = img.getBoundingClientRect().top + "px";
  clone.style.left = img.getBoundingClientRect().left + "px";
  clone.style.width = "200px";
  clone.style.zIndex = "9999";
  clone.style.transition = "all 0.8s ease";

  document.body.appendChild(clone);

  setTimeout(() => {
    clone.style.top = cartBtn.getBoundingClientRect().top + "px";
    clone.style.left = cartBtn.getBoundingClientRect().left + "px";
    clone.style.width = "20px";
    clone.style.opacity = "0.5";
  }, 50);

  setTimeout(() => clone.remove(), 800);

  // ADD TO CART
  addToCart(id, qty);
}

// RELATED PRODUCTS
function showRelatedProducts() {
  const container = document.getElementById("related-products");

  const related = products.filter(p => 
    p.category === product.category && p.id !== product.id
  );

  related.forEach(p => {
    container.innerHTML += `
      <div class="card text-center shadow m-2" style="min-width:200px;">
        <img src="${p.image}" class="card-img-top p-3" style="height:150px; object-fit:contain;">
        <div class="card-body">
          <h6>${p.name}</h6>
          <p>₹${p.price}</p>
          <a href="product_view.html?id=${p.id}" class="btn btn-primary btn-sm">View</a>
        </div>
      </div>
    `;
  });
}

showRelatedProducts();
</script>

<!-- FOOTER -->
<div id="footer-container"></div>
<script src="assets/js/common.js"></script>

</body>
</html>
