<!-- CART SECTION -->
<div class="container-fluid mt-5">
  <div class="cart-bg mx-auto" style="max-width:1200px;">
<h2 class="text-center mb-4 text-white">
  Cart (<span id="cart-count-title">0</span> items)
</h2>

  <div class="row">

    <!-- LEFT -->
    <div class="col-md-8" id="cart-items"></div>

    <!-- RIGHT -->
    <div class="col-md-4">
      <div class="summary-box shadow-lg">

        <h5 class="mb-3">Order Summary</h5>

        <div id="summary"></div>

        <hr>

        <p>Subtotal: <span id="subtotal">₹0</span></p>
        <p>Tax (5%): <span id="tax">₹0</span></p>
        <p>Discount: <span id="discount">₹0</span></p>

        <h4 class="font-weight-bold">Total: <span id="grand-total">₹0</span></h4>

        <input type="text" id="coupon" class="form-control mt-2" placeholder="Enter coupon">

        <button onclick="applyCoupon()" class="btn btn-outline-primary btn-sm mt-2 w-100">
          Apply Coupon
        </button>

      <button onclick="goToCheckout()" class="btn checkout-btn btn-block mt-3">
      Go to Checkout
      </button>

      </div>
    </div>
  </div>
