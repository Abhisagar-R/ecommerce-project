      <!-- PHONE WITH COUNTRY CODE -->
      <div class="form-group">

        <div class="d-flex">
          <select id="countryCode" class="form-control mr-2" style="max-width:120px;">

            <option value="+44">+44</option>

          <input type="text" id="phone" class="form-control" placeholder="Enter number">
        </div>
        <small class="error" id="errPhone"></small>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-control">
        <small class="error" id="errEmail"></small>
      </div>

      <!-- COUNTRY -->
      <div class="form-group">
        <label>Country</label>
        <select id="country" class="form-control">
          <option value="">Select country</option>
          <option>India</option>
          <option>USA</option>
          <option>UK</option>
        </select>
        <small class="error" id="errCountry"></small>
      </div>

      <div class="form-group">
        <label>Address Line 1</label>
        <input type="text" id="address1" class="form-control">
        <small class="error" id="errAddress1"></small>
      </div>

      <div class="form-group">
        <label>Address Line 2</label>
        <input type="text" id="address2" class="form-control">
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label>Postcode / ZIP</label>
          <input type="text" id="zip" class="form-control">
          <small class="error" id="errZip"></small>
        </div>

        <div class="form-group col-md-6">
          <label>Town / City</label>
          <input type="text" id="city" class="form-control">
          <small class="error" id="errCity"></small>
        </div>
      </div>

      <div class="form-group">
        <label>Additional Information</label>
        <textarea id="info" class="form-control"></textarea>
      </div>

      <button onclick="purchase()" class="btn purchase-btn btn-block">
        ✔ Purchase
      </button>

      <p id="successMsg" class="mt-3 text-center"></p>

    </div>

    <!-- RIGHT SUMMARY -->
    <div class="col-md-4">
      <div class="bg-white text-dark p-3 rounded shadow">
        <h5>Order Summary</h5>
        <div id="order-summary"></div>
        <hr>
        <h5>Total: ₹<span id="total">0</span></h5>
      </div>
    </div>

  </div>
</div>


<script src="assets/js/products.js"></script>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];

// SHOW ORDER SUMMARY
function renderSummary() {
  let total = 0;
  const container = document.getElementById("order-summary");

  cart.forEach(item => {
    total += item.price * item.quantity;

    container.innerHTML += `
      <p>${item.name} x ${item.quantity}
      <span class="float-right">₹${item.price * item.quantity}</span></p>
    `;
  });

  document.getElementById("total").innerText = total;
}

renderSummary();

// VALIDATION FUNCTION
function purchase() {
  let valid = true;

  // CLEAR OLD ERRORS
  document.querySelectorAll(".error").forEach(e => e.innerText = "");

  const first = document.getElementById("firstName").value.trim();
  const last = document.getElementById("lastName").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const country = document.getElementById("country").value;
  const address1 = document.getElementById("address1").value.trim();
  const zip = document.getElementById("zip").value.trim();
  const city = document.getElementById("city").value.trim();

  // NAME
  if (!first) {
    document.getElementById("errFirst").innerText = "Required";
    valid = false;
  }

  if (!last) {
    document.getElementById("errLast").innerText = "Required";
    valid = false;
  }

  // PHONE (ONLY NUMBERS)
  if (!/^[0-9]+$/.test(phone)) {
    document.getElementById("errPhone").innerText = "Enter valid number";
    valid = false;
  }

  // EMAIL
  if (!/^\S+@\S+\.\S+$/.test(email)) {
    document.getElementById("errEmail").innerText = "Invalid email";
    valid = false;
  }

  // COUNTRY
  if (!country) {
    document.getElementById("errCountry").innerText = "Select country";
    valid = false;
  }

  // ADDRESS
  if (!address1) {
    document.getElementById("errAddress1").innerText = "Required";
    valid = false;
  }

  if (!zip) {
    document.getElementById("errZip").innerText = "Required";
    valid = false;
  }

  if (!city) {
    document.getElementById("errCity").innerText = "Required";
    valid = false;
  }

  // FINAL CHECK
  if (!valid) return;

  // SUCCESS
  document.getElementById("successMsg").innerText = "🎉 Order placed successfully!";

  localStorage.removeItem("cart");

  setTimeout(() => {
    window.location.href = "order_confirmation.html";
  }, 2000);
}
</script>
