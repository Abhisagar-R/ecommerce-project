<!-- SEARCH SECTION -->
<div class="container mt-5">
  <h2 class="text-center mb-4">Search Products</h2>

  <input 
    type="text" 
    id="search" 
    class="form-control mb-4" 
    placeholder="Search products..."
  >

  <div class="row" id="results"></div>
</div>

<!-- JS FILES -->
<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>

<!-- SEARCH LOGIC -->
<script>
const input = document.getElementById("search");
const results = document.getElementById("results");

// DISPLAY PRODUCTS
function display(data) {
  results.innerHTML = "";

  if (data.length === 0) {
    results.innerHTML = "<p class='text-center w-100'>No products found ❌</p>";
    return;
  }

  data.forEach(p => {
    results.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card text-center shadow">
          <img src="${p.image}" class="card-img-top p-3" style="height:200px; object-fit:contain;">
          <div class="card-body">
            <h5>${p.name}</h5>
            <p>₹${p.price}</p>
            <button onclick="addToCart(${p.id})" class="btn btn-primary btn-sm">
              Add to Cart
            </button>
            <a href="product_view.html?id=${p.id}" class="btn btn-outline-primary btn-sm mt-2">
              View
            </a>
          </div>
        </div>
      </div>
    `;
  });
}

// INITIAL LOAD
display(products);

// SEARCH FUNCTION
let timer;

input.addEventListener("keyup", () => {
  clearTimeout(timer);

  timer = setTimeout(() => {
    const value = input.value.toLowerCase();

    const filtered = products.filter(p =>
      p.name.toLowerCase().includes(value)
    );

    display(filtered);
  }, 300);
});
</script>
